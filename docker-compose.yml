services:
  db:
    image: ghcr.io/fall-development-rob/lexius-db:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: legal_ai
      POSTGRES_USER: legal_ai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_ai -d legal_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

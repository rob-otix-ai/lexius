name: Auto-tag and Release

on:
  push:
    branches: [main]

jobs:
  tag-and-release:
    if: contains(github.event.head_commit.message, 'publish')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from commit message
        id: version
        run: |
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'v\d+\.\d+\.\d+' | head -1)
          if [ -z "$VERSION" ]; then
            echo "No version found in commit message"
            exit 0
          fi
          if git tag -l "$VERSION" | grep -q .; then
            echo "Tag $VERSION already exists"
            exit 0
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Extract changelog for this version
        if: steps.version.outputs.version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Try to extract the section for this version from CHANGELOG.md
          # If no specific version section, use [Unreleased]
          if grep -q "## \[$VERSION\]" CHANGELOG.md 2>/dev/null; then
            NOTES=$(awk "/## \[$VERSION\]/,/## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          elif grep -q "## \[Unreleased\]" CHANGELOG.md 2>/dev/null; then
            NOTES=$(awk "/## \[Unreleased\]/,/## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          else
            NOTES=""
          fi

          # If no changelog section found, generate from commits since last tag
          if [ -z "$NOTES" ]; then
            PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges)
            else
              NOTES=$(git log --pretty=format:"- %s" --no-merges -20)
            fi
          fi

          # Write to file (multiline output)
          echo "$NOTES" > /tmp/release-notes.md
          echo "Generated release notes for $VERSION"

      - name: Generate package summary
        if: steps.version.outputs.version
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          cat >> /tmp/release-notes.md << 'SUMMARY'

          ## Published Packages

          ### npm
          | Package | Version |
          |---------|---------|
          | [@robotixai/lexius-agent](https://www.npmjs.com/package/@robotixai/lexius-agent) | ![npm](https://img.shields.io/npm/v/@robotixai/lexius-agent) |
          | [@robotixai/lexius-cli](https://www.npmjs.com/package/@robotixai/lexius-cli) | ![npm](https://img.shields.io/npm/v/@robotixai/lexius-cli) |
          | [@robotixai/lexius-mcp](https://www.npmjs.com/package/@robotixai/lexius-mcp) | ![npm](https://img.shields.io/npm/v/@robotixai/lexius-mcp) |
          | [@robotixai/lexius-api](https://www.npmjs.com/package/@robotixai/lexius-api) | ![npm](https://img.shields.io/npm/v/@robotixai/lexius-api) |
          | [@robotixai/lexius-fetcher](https://www.npmjs.com/package/@robotixai/lexius-fetcher) | ![npm](https://img.shields.io/npm/v/@robotixai/lexius-fetcher) |

          ### Docker
          | Image | Tag |
          |-------|-----|
          | [robotixai/lexius-db](https://hub.docker.com/r/robotixai/lexius-db) | latest |
          | [robotixai/lexius-api](https://hub.docker.com/r/robotixai/lexius-api) | latest |
          | [robotixai/lexius-mcp](https://hub.docker.com/r/robotixai/lexius-mcp) | latest |

          ## Install

          ```bash
          npx @robotixai/lexius-agent
          npx @robotixai/lexius-agent --provider openrouter
          ```
          SUMMARY

      - name: Create tag
        if: steps.version.outputs.version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "${{ github.event.head_commit.message }}"
          git push origin --tags

      - name: Create GitHub Release
        if: steps.version.outputs.version
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint contracts
        run: npx @robotixai/specflow-cli enforce .

      - name: Core tests
        run: pnpm --filter @lexius/core test

      - name: API tests
        run: pnpm --filter @robotixai/lexius-api test

      - name: Fetcher tests
        run: pnpm --filter @robotixai/lexius-fetcher test

  db-integration:
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: legal_ai_test
          POSTGRES_USER: legal_ai
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U legal_ai -d legal_ai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://legal_ai:testpassword@localhost:5432/legal_ai_test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Enable pgvector extension
        run: PGPASSWORD=testpassword psql -h localhost -U legal_ai -d legal_ai_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run migrations
        run: pnpm --filter @lexius/db exec drizzle-kit migrate

      - name: Seed EU AI Act
        run: pnpm --filter @lexius/db run seed -- --legislation=eu-ai-act
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Seed DORA
        run: pnpm --filter @lexius/db run seed -- --legislation=dora
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Fetch EU AI Act from CELLAR
        run: node packages/fetcher/dist/cli.js ingest --celex 32024R1689 --legislation eu-ai-act --no-extract
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Fetch DORA from CELLAR
        run: node packages/fetcher/dist/cli.js ingest --celex 32022R2554 --legislation dora --no-extract
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Run extractor
        run: |
          node packages/fetcher/dist/cli.js extract --legislation eu-ai-act || true
          node packages/fetcher/dist/cli.js extract --legislation dora || true

      - name: Re-seed (resolves derivedFrom after fetch)
        run: |
          pnpm --filter @lexius/db run seed -- --legislation=eu-ai-act || true
          pnpm --filter @lexius/db run seed -- --legislation=dora || true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Extractor cross-check
        run: pnpm crosscheck
        continue-on-error: true

      - name: E2E tests
        run: pnpm --filter ./tests/e2e test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

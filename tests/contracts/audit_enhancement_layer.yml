contract_meta:
  id: audit_enhancement_layer
  version: 1
  created_from_spec: "ARD-008 — enhancement service must be a port, not a concrete implementation"
  covers_reqs:
    - AUDIT-004
    - AUDIT-005
  owner: "legal-ai-team"

llm_policy:
  enforce: true
  llm_may_modify_non_negotiables: false
  override_phrase: "override_contract: audit_enhancement_layer"

rules:
  non_negotiable:
    - id: AUDIT-004
      title: "EnhanceAuditReport must use EnhancementService port, not concrete LLM SDKs"
      scope:
        - "packages/core/src/use-cases/enhance-audit-report*.{ts,js}"
      behavior:
        forbidden_patterns:
          - pattern: /from\s+['"](?:@anthropic-ai\/sdk|openai)/
            message: "EnhanceAuditReport must depend on the EnhancementService port, not LLM SDKs directly"
        required_patterns:
          - pattern: /EnhancementService/
            message: "EnhanceAuditReport must reference the EnhancementService port"
        example_violation: |
          import Anthropic from "@anthropic-ai/sdk";
        example_compliant: |
          import type { EnhancementService } from "../domain/ports/enhancement-service.js";

    - id: AUDIT-005
      title: "Model configuration must come from environment, not hardcoded"
      scope:
        - "packages/agent/src/**/*.{ts,js}"
        - "!packages/agent/src/**/__tests__/**"
        - "!packages/agent/src/**/*.test.{ts,js}"
      behavior:
        forbidden_patterns:
          - pattern: /model:\s*["']claude-(?:opus|sonnet|haiku)-[\d\-]+["']/
            message: "Model names must be read from environment variables (ANTHROPIC_MODEL_REASONING, ANTHROPIC_MODEL_STRUCTURED, or ANTHROPIC_MODEL), not hardcoded"
        example_violation: |
          model: "claude-sonnet-4-6",
        example_compliant: |
          model: process.env.ANTHROPIC_MODEL_STRUCTURED || "claude-sonnet-4-6",

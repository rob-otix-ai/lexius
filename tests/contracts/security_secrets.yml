contract_meta:
  id: security_secrets
  version: 1
  created_from_spec: "Baseline security — always generated"
  covers_reqs:
    - SEC-001
  owner: "specflow-generated"

llm_policy:
  enforce: true
  llm_may_modify_non_negotiables: false
  override_phrase: "override_contract: security_secrets"

rules:
  non_negotiable:
    - id: SEC-001
      title: "No hardcoded secrets in source code"
      scope:
        - "packages/*/src/**/*.{ts,js,tsx,jsx}"
        - "!packages/*/src/**/*.test.*"
        - "!packages/*/src/**/__tests__/**"
      behavior:
        forbidden_patterns:
          - pattern: /(password|secret|api_key|apikey|token)\s*[:=]\s*['"][^'"]{8,}['"]/i
            message: "Hardcoded secret detected — use environment variable"
          - pattern: /sk_live_[a-zA-Z0-9]{20,}/
            message: "Stripe live key hardcoded — use env var"
          - pattern: /ghp_[a-zA-Z0-9]{36}/
            message: "GitHub PAT hardcoded — use env var"
          - pattern: /-----BEGIN (RSA |EC )?PRIVATE KEY-----/
            message: "Private key in source code — use secrets manager"
        example_violation: |
          const API_KEY = "sk_live_abc123def456ghi789";
        example_compliant: |
          const API_KEY = process.env.STRIPE_SECRET_KEY;

contract_meta:
  id: dora_plugin_isolation
  version: 1
  created_from_spec: "ARD-009 / DDD-008 — DORA logic must live only in the DORA plugin module"
  covers_reqs:
    - DORA-001
    - DORA-002
  owner: "legal-ai-team"

llm_policy:
  enforce: true
  llm_may_modify_non_negotiables: false
  override_phrase: "override_contract: dora_plugin_isolation"

rules:
  non_negotiable:
    - id: DORA-001
      title: "DORA-specific references must not leak into generic domain or use cases"
      scope:
        - "packages/core/src/domain/**/*.{ts,js}"
        - "packages/core/src/use-cases/**/*.{ts,js}"
        - "!packages/core/src/**/__tests__/**"
        - "!packages/core/src/**/*.test.{ts,js}"
      behavior:
        forbidden_patterns:
          - pattern: /\bDORA\b|digital.?operational.?resilience|critical.?ict.?third.?party|\bCTPP\b|\bTLPT\b|TIBER-EU/i
            message: "DORA-specific references must not appear in generic domain or use cases — move to packages/core/src/legislation/dora/"
          - pattern: /Article\s+3[0-5]\s+DORA|Regulation\s+2022\/2554/i
            message: "Direct DORA article references must not appear outside the DORA plugin"
        example_violation: |
          // In packages/core/src/use-cases/...
          if (input.signals.is_ctpp_designated) { ... }
        example_compliant: |
          // In packages/core/src/use-cases/...
          const plugin = this.pluginRegistry.get(input.legislationId);
          const result = plugin.classifyBySignals(input.signals);

    - id: DORA-002
      title: "DORA plugin must implement all required LegislationPlugin methods"
      scope:
        - "packages/core/src/legislation/dora/index.{ts,js}"
      behavior:
        required_patterns:
          - pattern: /implements\s+LegislationPlugin/
            message: "DORA plugin must explicitly implement LegislationPlugin interface"
          - pattern: /getAssessments\s*\(/
            message: "DORA plugin must expose getAssessments()"
          - pattern: /getSignalSchema\s*\(/
            message: "DORA plugin must expose getSignalSchema()"
        example_compliant: |
          export class DoraPlugin implements LegislationPlugin {
            getSignalSchema() { return signalSchema; }
            getAssessments() { return assessments; }
          }
